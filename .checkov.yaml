# Checkov configuration for awslabs/startups
# The security-scanners workflow runs `checkov -d .` across the whole repo and
# auto-discovers this file.
#
# skip-path excludes intentionally-non-compliant Terraform TEST FIXTURES that
# exercise the tf-best-practices policy validator
# (skills/tf-best-practices/scripts/validate-terraform-policy.py +
#  its test_validate_terraform_policy.py). These fixtures MUST stay
# non-compliant (e.g. an ALB that forwards plaintext HTTP) so the validator's
# failure paths are tested — sanitizing them to satisfy Checkov would defeat
# their purpose. They are never deployed.
skip-path:
  - migrate/plugins/migration-to-aws/skills/tf-best-practices/fixtures/terraform-policy
  # Live-discovery replay fixture: deliberately models a startup's EXISTING,
  # imperfect GCP infrastructure (the migration SOURCE, never deployed). Its
  # drift vs the canned gcloud captures is the test — sanitizing it to satisfy
  # Checkov would change the source-provider state the fixture exists to model.
  - migrate/plugins/migration-to-aws/fixtures/gcp-live-capture/workspace-terraform
